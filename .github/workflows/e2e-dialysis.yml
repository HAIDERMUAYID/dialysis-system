name: E2E — D-IRS Dialysis

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'client/src/components/Dialysis/**'
      - 'server/routes/dialysis.js'
      - 'e2e/**'
      - 'playwright.config.ts'

jobs:
  e2e-dialysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hospital_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d hospital_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/hospital_test
      JWT_SECRET: e2e-test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm run install-all

      - name: Prepare database
        run: npx prisma db push && npm run prisma:seed

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
